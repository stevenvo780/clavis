<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Paideía">
  <defs>
    <linearGradient id="pd-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0a85e"/>
      <stop offset="0.5" stop-color="#b8873a"/>
      <stop offset="1" stop-color="#c0522a"/>
    </linearGradient>
    <radialGradient id="pd-bg" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#131e22"/>
      <stop offset="1" stop-color="#0b1417"/>
    </radialGradient>
  </defs>

  <!-- Dark rounded-square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#pd-bg)"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="13.5" fill="none" stroke="#e0a85e" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Greek Alpha (α) — Paideía symbol, centered -->
  <!-- Left leg -->
  <line x1="14" y1="46" x2="30" y2="17" stroke="url(#pd-gold)" stroke-width="4" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="50" y1="46" x2="34" y2="17" stroke="url(#pd-gold)" stroke-width="4" stroke-linecap="round"/>
  <!-- Cross bar (curved) -->
  <path d="M 20 35 Q 32 29 44 35" fill="none" stroke="url(#pd-gold)" stroke-width="3" stroke-linecap="round"/>

  <!-- Small accent dot at apex -->
  <circle cx="32" cy="15" r="2.2" fill="#e0a85e" opacity="0.7"/>
</svg>
